app = 'airdrop-tracker-api'
primary_region = 'sin'

[build]

[env]
  APP_PORT = '8080'
  GIN_MODE = 'release'
  DB_PATH = '/app/data/airdrop.db'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
