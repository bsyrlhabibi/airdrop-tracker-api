# fly.toml app configuration file generated for airdrop-tracker-api-v1 on 2026-05-26T20:41:09Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'airdrop-tracker-api-v1'
primary_region = 'dfw'

[build]
  dockerfile = 'Dockerfile'

[env]
  APP_PORT = '8080'
  DB_PATH = '/app/data/airdrop.db'
  GIN_MODE = 'release'

[[mounts]]
  source = 'airdrop_data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
