services:
  api:
    build: .
    container_name: airdrop-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - airdrop_data:/app/data
    environment:
      - APP_PORT=8080
      - DB_PATH=/app/data/airdrop.db
      - GIN_MODE=release
      - JWT_SECRET=${JWT_SECRET:-change-me-to-random-string}

volumes:
  airdrop_data:
