basePath: /
definitions:
  handler.AccountStats:
    properties:
      active_airdrops:
        type: integer
      color:
        type: string
      completed_tasks:
        type: integer
      id:
        type: integer
      name:
        type: string
      pending_tasks:
        type: integer
      total_airdrops:
        type: integer
      total_tasks:
        type: integer
      total_wallets:
        type: integer
    type: object
  handler.AssignAirdropRequest:
    properties:
      airdrop_id:
        example: 1
        type: integer
      custom_tasks:
        items:
          $ref: '#/definitions/handler.CustomTaskRequest'
        type: array
      notes:
        example: Focus on bridging
        type: string
      template:
        description: basic, full, custom
        example: basic
        type: string
    type: object
  handler.AuthResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/model.User'
    type: object
  handler.CloneAccountRequest:
    properties:
      color:
        example: '#EF4444'
        type: string
      name:
        example: Akun 2
        type: string
    type: object
  handler.ComparisonRow:
    properties:
      account_color:
        type: string
      account_id:
        type: integer
      account_name:
        type: string
      completed_airdrops:
        type: integer
      completed_tasks:
        type: integer
      pending_tasks:
        type: integer
      total_airdrops:
        type: integer
      total_tasks:
        type: integer
      wallet_count:
        type: integer
    type: object
  handler.CreateAccountRequest:
    properties:
      color:
        example: '#3B82F6'
        type: string
      name:
        example: Akun 1
        type: string
      notes:
        example: Main sybil account
        type: string
    type: object
  handler.CreateAirdropRequest:
    properties:
      category:
        example: rumored
        type: string
      chain:
        example: Ethereum
        type: string
      name:
        example: zkSync
        type: string
      notes:
        example: Bridge weekly
        type: string
      priority:
        example: high
        type: string
      url:
        example: https://zksync.io
        type: string
    type: object
  handler.CreateTaskRequest:
    properties:
      description:
        example: Swap ETH to USDC
        type: string
      frequency:
        example: weekly
        type: string
    type: object
  handler.CreateWalletRequest:
    properties:
      account_id:
        example: 1
        type: integer
      address:
        example: 0x7245...139b
        type: string
      chain:
        example: Ethereum
        type: string
      label:
        example: Main Wallet
        type: string
    type: object
  handler.CustomTaskRequest:
    properties:
      description:
        example: Bridge 0.1 ETH
        type: string
      frequency:
        example: weekly
        type: string
    type: object
  handler.DashboardSummary:
    properties:
      accounts:
        items:
          $ref: '#/definitions/handler.AccountStats'
        type: array
      active_airdrops:
        type: integer
      completed_tasks:
        type: integer
      pending_tasks:
        type: integer
      total_accounts:
        type: integer
      total_airdrops:
        type: integer
      total_tasks:
        type: integer
      total_wallets:
        type: integer
    type: object
  handler.LoginRequest:
    properties:
      email:
        example: user@email.com
        type: string
      password:
        example: secret123
        type: string
    type: object
  handler.RegisterRequest:
    properties:
      email:
        example: user@email.com
        type: string
      name:
        example: Bita
        type: string
      password:
        example: secret123
        type: string
    type: object
  handler.UpdateAccountAirdropRequest:
    properties:
      notes:
        example: Focus on bridging
        type: string
      status:
        example: active
        type: string
    type: object
  handler.UpdateAccountRequest:
    properties:
      color:
        example: '#EF4444'
        type: string
      name:
        example: Akun 1
        type: string
      notes:
        example: Updated notes
        type: string
    type: object
  model.Account:
    properties:
      account_airdrops:
        items:
          $ref: '#/definitions/model.AccountAirdrop'
        type: array
      color:
        type: string
      created_at:
        type: string
      id:
        type: integer
      name:
        type: string
      notes:
        type: string
      updated_at:
        type: string
      user_id:
        type: integer
      wallets:
        description: Relations
        items:
          $ref: '#/definitions/model.Wallet'
        type: array
    type: object
  model.AccountAirdrop:
    properties:
      account:
        allOf:
        - $ref: '#/definitions/model.Account'
        description: Relations
      account_id:
        type: integer
      airdrop:
        $ref: '#/definitions/model.Airdrop'
      airdrop_id:
        type: integer
      created_at:
        type: string
      id:
        type: integer
      notes:
        type: string
      status:
        description: active, completed, paused
        type: string
      tasks:
        items:
          $ref: '#/definitions/model.Task'
        type: array
      updated_at:
        type: string
    type: object
  model.Airdrop:
    properties:
      category:
        type: string
      chain:
        type: string
      created_at:
        type: string
      deadline:
        type: string
      id:
        type: integer
      name:
        type: string
      notes:
        type: string
      priority:
        type: string
      status:
        type: string
      updated_at:
        type: string
      url:
        type: string
      user_id:
        type: integer
    type: object
  model.Task:
    properties:
      account_airdrop:
        allOf:
        - $ref: '#/definitions/model.AccountAirdrop'
        description: Relations
      account_airdrop_id:
        type: integer
      completed_at:
        type: string
      created_at:
        type: string
      description:
        type: string
      frequency:
        description: once, daily, weekly, monthly
        type: string
      gas_spent:
        type: number
      id:
        type: integer
      is_completed:
        type: boolean
      next_due:
        type: string
      tx_hash:
        type: string
    type: object
  model.User:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  model.Wallet:
    properties:
      account:
        allOf:
        - $ref: '#/definitions/model.Account'
        description: Relations
      account_id:
        type: integer
      address:
        type: string
      chain:
        type: string
      created_at:
        type: string
      id:
        type: integer
      label:
        type: string
      user_id:
        type: integer
    type: object
host: airdrop-tracker-api-v1.fly.dev
info:
  contact:
    email: support@airdrop-tracker.local
    name: Bita
  description: Personal airdrop task management API
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Airdrop Tracker API
  version: "1.0"
paths:
  /api/account-airdrops/{id}:
    get:
      description: Get a specific account-airdrop with tasks
      parameters:
      - description: Account Airdrop ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.AccountAirdrop'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get account-airdrop detail
      tags:
      - AccountAirdrops
    put:
      consumes:
      - application/json
      description: Update status or notes for an account-airdrop assignment
      parameters:
      - description: Account Airdrop ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.UpdateAccountAirdropRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.AccountAirdrop'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update account-airdrop
      tags:
      - AccountAirdrops
  /api/account-airdrops/{id}/tasks:
    get:
      description: Get all tasks for a specific account-airdrop
      parameters:
      - description: Account Airdrop ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Task'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List tasks for account-airdrop
      tags:
      - Tasks
    post:
      consumes:
      - application/json
      description: Add new task to an account-airdrop
      parameters:
      - description: Account Airdrop ID
        in: path
        name: id
        required: true
        type: integer
      - description: Task data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.CreateTaskRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Task'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create task
      tags:
      - Tasks
  /api/accounts:
    get:
      description: Get all sybil accounts for authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Account'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List all accounts
      tags:
      - Accounts
    post:
      consumes:
      - application/json
      description: Create new sybil account
      parameters:
      - description: Account data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.CreateAccountRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Account'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create account
      tags:
      - Accounts
  /api/accounts/{id}:
    delete:
      description: Delete account (only if empty, or use ?force=true)
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      - description: Force delete with all data
        in: query
        name: force
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete account
      tags:
      - Accounts
    get:
      description: Get single account by ID with wallets and account-airdrops
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Account'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get account detail
      tags:
      - Accounts
    put:
      consumes:
      - application/json
      description: Update account name, color, notes
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.UpdateAccountRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Account'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update account
      tags:
      - Accounts
  /api/accounts/{id}/airdrops:
    get:
      description: Get all airdrop assignments for a specific account
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.AccountAirdrop'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List airdrops for account
      tags:
      - Accounts
    post:
      consumes:
      - application/json
      description: Assign a global airdrop to an account with optional task template
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      - description: Assignment data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.AssignAirdropRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.AccountAirdrop'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Assign airdrop to account
      tags:
      - Accounts
  /api/accounts/{id}/airdrops/{airdrop_id}:
    delete:
      description: Unlink an airdrop from an account and delete associated tasks
      parameters:
      - description: Account ID
        in: path
        name: id
        required: true
        type: integer
      - description: Airdrop ID
        in: path
        name: airdrop_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Remove airdrop from account
      tags:
      - Accounts
  /api/accounts/{id}/clone:
    post:
      consumes:
      - application/json
      description: Clone an account with its airdrop assignments and tasks (not wallets)
      parameters:
      - description: Source Account ID
        in: path
        name: id
        required: true
        type: integer
      - description: New account data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.CloneAccountRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Account'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Clone account
      tags:
      - Accounts
  /api/airdrops:
    get:
      description: Get all global airdrops for the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Airdrop'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List all airdrops
      tags:
      - Airdrops
    post:
      consumes:
      - application/json
      description: Add new global airdrop to the catalog
      parameters:
      - description: Airdrop data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.CreateAirdropRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Airdrop'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create airdrop
      tags:
      - Airdrops
  /api/airdrops/{id}:
    delete:
      description: Remove airdrop from the global catalog
      parameters:
      - description: Airdrop ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete airdrop
      tags:
      - Airdrops
    get:
      description: Get single airdrop by ID
      parameters:
      - description: Airdrop ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Airdrop'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get airdrop detail
      tags:
      - Airdrops
    put:
      consumes:
      - application/json
      description: Update existing airdrop
      parameters:
      - description: Airdrop ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.CreateAirdropRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.Airdrop'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update airdrop
      tags:
      - Airdrops
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and get JWT token
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.AuthResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Login user
      tags:
      - Auth
  /api/auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account
      parameters:
      - description: Register data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register new user
      tags:
      - Auth
  /api/dashboard:
    get:
      description: Get summary statistics with per-account breakdown
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handler.DashboardSummary'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get dashboard stats
      tags:
      - Dashboard
  /api/dashboard/comparison:
    get:
      description: Get per-account progress stats for comparison
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/handler.ComparisonRow'
            type: array
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get comparison table
      tags:
      - Dashboard
  /api/tasks/{id}:
    delete:
      description: Remove a task permanently
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete task
      tags:
      - Tasks
  /api/tasks/{id}/complete:
    put:
      description: Mark a task as done
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
